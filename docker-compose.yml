services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: timestable
      POSTGRES_USER: timestable
      POSTGRES_PASSWORD: timestable-internal-password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrate.sql:/docker-entrypoint-initdb.d/001_migrate.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      TIMESTABLE_DB_HOST: db
      TIMESTABLE_DB_NAME: timestable
      TIMESTABLE_DB_USER: timestable
      TIMESTABLE_DB_PASSWORD: timestable-internal-password
      TIMESTABLE_DB_PORT: 5432
      TIMESTABLE_DB_OPTIONS: -c timezone=UTC
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/', timeout=3)",
        ]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "7000:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 2s

volumes:
  postgres_data: